on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string
      target:
        description: 'Deployment target: "." for root, or preview/name for temporary previews'
        required: true
        default: '.'
        type: string

name: Manual Deploy

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::roxygen2, any::pkgdown, local::.
          needs: website

      - name: Generate documentation
        run: Rscript -e "roxygen2::roxygenize()"

      - name: Build pkgdown site
        run: |
          options(rlib_message_verbosity = "verbose")
          pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: docs
          branch: gh-pages
          target-folder: ${{ inputs.target }}
          clean: false

      - name: Deployment Summary
        run: |
          if [ "${{ inputs.target }}" = "." ]; then
            TARGET_PATH=""
            TARGET_DESC="root"
          else
            TARGET_PATH="${{ inputs.target }}/"
            TARGET_DESC="${{ inputs.target }}"
          fi

          echo "## 🚀 Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | \`${TARGET_DESC}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://big-life-lab.github.io/MockData/${TARGET_PATH} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ℹ️ Target options" >> $GITHUB_STEP_SUMMARY
          echo "- Use \`.\` to deploy to the site root" >> $GITHUB_STEP_SUMMARY
          echo "- Use \`preview/name\` or another explicit path for temporary previews" >> $GITHUB_STEP_SUMMARY
